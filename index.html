<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered Career & Productivity Coach for Students. Get internship-ready with personalized learning roadmaps." />
    <meta name="theme-color" content="#0a1929" />
    <meta property="og:title" content="Student Success OS" />
    <meta property="og:description" content="Your AI-Powered Career Coach" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Student Success OS — AI-Powered Career Coach</title>
    <style>
      body { margin: 0; background: #0a1929; min-height: 100vh; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      #root { min-height: 100vh; }
      .loading-splash { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #5a7a9a; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; letter-spacing: 0.3px; }
      @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
      .loading-splash::after { content: ''; display: inline-block; width: 6px; margin-left: 8px; animation: pulse 1s ease-in-out infinite; }
    </style>
  </head>

    <div id="root">
      <div class="loading-splash">Loading Student Success OS</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
